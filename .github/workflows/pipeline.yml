name: CI_CD_Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # 1. Repository Checkout
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Dependency Quraşdırma
      - name: Install Linter
        run: npm install htmlhint -g

      # 3. Build və ya Validation
      - name: HTML Lint Check
        run: htmlhint *.html

      # 4. Testlər (Real yoxlanış)
      - name: Run Content Tests
        run: |
          grep -q "<html>" index.html || (echo "Xəta: html teqi tapılmadı" && exit 1)
          echo "Bütün testlər uğurla keçdi."

      # 5. Artifact (Yoxlanılmış faylları müvəqqəti yaddaşa verir)
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-files
          path: .

  deploy:
    # Bu hissə yalnız "main" qoluna push olanda və testlər keçəndə işləyəcək
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          npm install -g vercel
          vercel --prod --token=$VERCEL_TOKEN --confirm
